name: juice-shop-security-lab

services:
  juice-shop:
    build:
      context: ./juice-shop
    image: local/juice-shop:security-scan
    pull_policy: build
    container_name: juice-shop-app
    ports:
      - "3000:3000"
    networks:
      - security-lab
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  webgoat:
    image: webgoat/webgoat:v2025.3
    container_name: webgoat-app
    environment:
      TZ: America/Guayaquil
    ports:
      - "127.0.0.1:8082:8080"
      - "127.0.0.1:9092:9090"
    networks:
      - security-lab
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/WebGoat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  sonar-db:
    image: postgres:16-alpine
    container_name: juice-shop-sonar-db
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - security-lab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:lts-community
    container_name: juice-shop-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
    ports:
      - "9000:9000"
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 8192
        hard: 8192
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - security-lab

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: juice-shop-zap
    user: zap
    depends_on:
      - juice-shop
      - webgoat
    command: ["zap-webswing.sh"]
    environment:
      ZAP_WEBSWING_OPTS: >-
        -host 0.0.0.0
        -port 8090
        -config api.disablekey=true
        -config api.addrs.addr.name=.*
        -config api.addrs.addr.regex=true
    ports:
      - "127.0.0.1:8081:8080"
      - "127.0.0.1:8090:8090"
    volumes:
      - ./zap/webswing.config:/zap/webswing/webswing.config:ro
      - ./security-reports/zap:/zap/wrk:rw
    networks:
      - security-lab

networks:
  security-lab:
    driver: bridge

volumes:
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
